<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Art to SVG Converter</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
    .drop-zone { border: 2px dashed #4f46e5; transition: all 0.3s; }
    .drop-zone.dragover { border-color: #818cf8; background: rgba(99,102,241,0.08); transform: scale(1.01); }
    .glow { box-shadow: 0 0 40px rgba(99,102,241,0.15); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .svg-code-box { max-height: 200px; overflow-y: auto; }
    canvas { image-rendering: pixelated; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto bg-slate-950 text-white"><!-- Header -->
   <header class="text-center pt-12 pb-6 px-4">
    <h1 id="main-title" class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">Pixel Art → SVG</h1>
    <p id="subtitle" class="mt-3 text-slate-400 text-lg">Upload your 512×512 pixel art and convert it to crisp, scalable SVG</p>
   </header><!-- Main Content -->
   <main class="max-w-4xl mx-auto px-4 pb-16"><!-- Upload Zone -->
    <div id="drop-zone" class="drop-zone rounded-2xl p-12 text-center cursor-pointer glow bg-slate-900/50 backdrop-blur fade-up">
     <div class="flex flex-col items-center gap-4">
      <div class="w-16 h-16 rounded-full bg-indigo-500/20 flex items-center justify-center"><i data-lucide="upload" class="w-8 h-8 text-indigo-400"></i>
      </div>
      <div>
       <p class="text-xl font-semibold text-slate-200">Drop your pixel art here</p>
       <p class="text-sm text-slate-500 mt-1">PNG or any image • 512×512 recommended</p>
      </div>
     </div><input type="file" id="file-input" accept="image/*" class="hidden">
    </div><!-- Result Section -->
    <div id="result-section" class="hidden mt-10 fade-up"><!-- Preview Cards -->
     <div class="grid md:grid-cols-2 gap-6 mb-8"><!-- Original -->
      <div class="bg-slate-900/70 rounded-2xl p-5 border border-slate-800">
       <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Original</h3>
       <div class="flex justify-center items-center bg-[repeating-conic-gradient(#1e293b_0%_25%,#0f172a_0%_50%)] bg-[length:16px_16px] rounded-xl p-4 min-h-[260px]">
        <canvas id="original-canvas" class="max-w-full max-h-[240px] rounded"></canvas>
       </div>
      </div><!-- SVG Output -->
      <div class="bg-slate-900/70 rounded-2xl p-5 border border-slate-800">
       <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">SVG Output</h3>
       <div id="svg-preview" class="flex justify-center items-center bg-[repeating-conic-gradient(#1e293b_0%_25%,#0f172a_0%_50%)] bg-[length:16px_16px] rounded-xl p-4 min-h-[260px]">
       </div>
      </div>
     </div><!-- Actions -->
     <div class="flex flex-wrap gap-3 justify-center mb-8"><button id="btn-download-svg" class="flex items-center gap-2 px-5 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-semibold transition"> <i data-lucide="download" class="w-4 h-4"></i> Download SVG </button> <button id="btn-copy-svg" class="flex items-center gap-2 px-5 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl font-semibold transition"> <i data-lucide="copy" class="w-4 h-4"></i> Copy SVG Code </button>
     </div><!-- SVG Code -->
     <div class="bg-slate-900/70 rounded-2xl p-5 border border-slate-800">
      <div class="flex items-center justify-between mb-3">
       <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">SVG Code</h3><span id="copy-feedback" class="text-xs text-emerald-400 hidden">Copied!</span>
      </div>
      <div class="svg-code-box bg-slate-950 rounded-xl p-4 mono text-xs text-slate-300 whitespace-pre-wrap break-all" id="svg-code-box"></div>
     </div>
    </div>
   </main>
  </div>
  <script>
  const defaultConfig = {
    main_title: 'Pixel Art → SVG',
    subtitle: 'Upload your 512×512 pixel art and convert it to crisp, scalable SVG',
    background_color: '#020617',
    surface_color: '#0f172a',
    text_color: '#e2e8f0',
    primary_color: '#6366f1',
    secondary_color: '#1e293b'
  };

  let svgString = '';

  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => {
      document.getElementById('main-title').textContent = config.main_title || defaultConfig.main_title;
      document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
      const bg = config.background_color || defaultConfig.background_color;
      const txt = config.text_color || defaultConfig.text_color;
      const primary = config.primary_color || defaultConfig.primary_color;
      document.getElementById('app').style.backgroundColor = bg;
      document.getElementById('app').style.color = txt;
      document.getElementById('main-title').style.background = `linear-gradient(to right, ${primary}, #a78bfa)`;
      document.getElementById('main-title').style.webkitBackgroundClip = 'text';
      document.getElementById('main-title').style.webkitTextFillColor = 'transparent';
      const font = config.font_family || defaultConfig.font_family || 'Outfit';
      document.getElementById('app').style.fontFamily = `${font}, sans-serif`;
      const size = config.font_size || 16;
      document.getElementById('subtitle').style.fontSize = `${size * 1.1}px`;
    },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
        { get: () => config.secondary_color || defaultConfig.secondary_color, set: (v) => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } }
      ],
      borderables: [],
      fontEditable: {
        get: () => config.font_family || 'Outfit',
        set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => config.font_size || 16,
        set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    }),
    mapToEditPanelValues: (config) => new Map([
      ['main_title', config.main_title || defaultConfig.main_title],
      ['subtitle', config.subtitle || defaultConfig.subtitle]
    ])
  });

  // File handling
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', (e) => { if(e.target.files[0]) processFile(e.target.files[0]); });

  function processFile(file) {
    const img = new Image();
    img.onload = () => convertToSVG(img);
    img.src = URL.createObjectURL(file);
  }

  function convertToSVG(img) {
    const size = 512;
    const canvas = document.getElementById('original-canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, 0, 0, size, size);

    const imageData = ctx.getImageData(0, 0, size, size);
    const pixels = imageData.data;

    // Build SVG - group by color using rects
    let rects = '';
    const visited = new Uint8Array(size * size);

    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        const idx = y * size + x;
        if (visited[idx]) continue;
        const pi = idx * 4;
        const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2], a = pixels[pi+3];
        if (a === 0) { visited[idx] = 1; continue; }

        // Find width of same-color run
        let w = 1;
        while (x + w < size) {
          const ni = (y * size + x + w);
          if (visited[ni]) break;
          const npi = ni * 4;
          if (pixels[npi] !== r || pixels[npi+1] !== g || pixels[npi+2] !== b || pixels[npi+3] !== a) break;
          w++;
        }

        for (let i = 0; i < w; i++) visited[y * size + x + i] = 1;

        const hex = '#' + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
        const opacity = a < 255 ? ` opacity="${(a/255).toFixed(2)}"` : '';
        rects += `<rect x="${x}" y="${y}" width="${w}" height="1" fill="${hex}"${opacity}/>`;
      }
    }

    svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" shape-rendering="crispEdges">${rects}</svg>`;

    // Show results
    document.getElementById('result-section').classList.remove('hidden');
    document.getElementById('svg-preview').innerHTML = `<img src="data:image/svg+xml;charset=utf-8,${encodeURIComponent(svgString)}" class="max-w-full max-h-[240px] rounded" style="image-rendering:pixelated;">`;
    document.getElementById('svg-code-box').textContent = svgString.length > 50000 ? svgString.substring(0, 50000) + '\n... (truncated for display)' : svgString;
    lucide.createIcons();
  }

  // Download SVG
  document.getElementById('btn-download-svg').addEventListener('click', () => {
    if (!svgString) return;
    const blob = new Blob([svgString], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'pixel-art.svg'; a.click();
    URL.revokeObjectURL(url);
  });

  // Copy SVG
  document.getElementById('btn-copy-svg').addEventListener('click', () => {
    if (!svgString) return;
    navigator.clipboard.writeText(svgString).then(() => {
      const fb = document.getElementById('copy-feedback');
      fb.classList.remove('hidden');
      setTimeout(() => fb.classList.add('hidden'), 2000);
    });
  });

  lucide.createIcons();
</script>

</html>
